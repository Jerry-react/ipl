workflows:
  android-build:
    name: Android Build
    max_build_duration: 60

    environment:
      node: latest
      java: 17

    scripts:
      - java -version
      - export JAVA_HOME=$JAVA_HOME_17_X64 || true
      - export PATH=$JAVA_HOME/bin:$PATH
      - java -version

      - npm install
      - npm run build
      - npx cap sync android
      - chmod +x android/gradlew
      - cd android && ./gradlew assembleDebug

    artifacts:
      - android/app/build/outputs/**/*.apk
